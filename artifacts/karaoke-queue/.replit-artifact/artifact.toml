kind = "web"
previewPath = "/"
title = "KaraoKê Queue"
version = "1.0.0"
id = "artifacts/karaoke-queue"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23593

[services.development]
run = "pnpm --filter @workspace/karaoke-queue run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/karaoke-queue", "run", "build" ]
publicDir = "artifacts/karaoke-queue/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23593"
BASE_PATH = "/"
