services:
  - type: web
    name: karaoke-queue
    runtime: node
    plan: free
    autoDeploy: true
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter @workspace/db run push && pnpm run build
    startCommand: pnpm --filter @workspace/api-server run start
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_VERSION
        value: 24.14.1
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: karaoke-queue-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_DISPLAY_NAME
        value: Operador
      - key: YOUTUBE_API_KEY
        sync: false
      - key: LOG_LEVEL
        value: info

databases:
  - name: karaoke-queue-db
    plan: free
    databaseName: karaoke_queue
    user: karaoke_queue
